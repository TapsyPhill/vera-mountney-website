<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Vera Mountney — Creative Language User & Adviser">
  <title>Vera Mountney</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      height: 100%;
    }

    body {
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(
        135deg,
        #1e3a8a 0%,
        #5b21b6 45%,
        #7c3aed 70%,
        #d4a574 100%
      );
      background-attachment: fixed;
      color: #ffffff;
      padding: 2rem 1.5rem;
      line-height: 1.6;
    }

    .card {
      max-width: 36rem;
      width: 100%;
      text-align: center;
      padding: 3.5rem 2.5rem;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 1.25rem;
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.2),
        0 0 0 1px rgba(255, 255, 255, 0.05) inset;
    }

    .divider {
      width: 3rem;
      height: 3px;
      margin: 1.75rem auto;
      background: linear-gradient(90deg, transparent, #e8c99b, transparent);
      border-radius: 2px;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 2.75rem);
      font-weight: 300;
      letter-spacing: 0.04em;
      line-height: 1.2;
    }

    .status {
      font-size: clamp(1rem, 2.5vw, 1.125rem);
      font-weight: 400;
      color: rgba(255, 255, 255, 0.92);
      letter-spacing: 0.02em;
    }

    .tagline {
      font-size: clamp(0.875rem, 2vw, 1rem);
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #e8c99b;
    }

    @media (max-width: 480px) {
      .card {
        padding: 2.5rem 1.75rem;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Vera Mountney</h1>
    <div class="divider" aria-hidden="true"></div>
    <p class="status">Website deployment test successful.</p>
    <div class="divider" aria-hidden="true"></div>
    <p class="tagline">Creative Language User &amp; Adviser</p>
  </main>
</body>
</html>
